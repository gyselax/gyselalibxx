spack:
  definitions:
  - packages:
    - cmake
    - ginkgo@1.9 ~openmp +rocm amdgpu_target=gfx90a
    - googletest +gmock
    - kokkos@5.0.1 ~openmp +rocm +hip_relocatable_device_code amdgpu_target=gfx90a
    - kokkos-fft@1.0 host_backend=fftw-serial device_backend=hipfft
    - kokkos-kernels@5.0.1 ~shared
    - kokkos-tools
    - lapack
    - ninja
    - paraconf
    - pdi@1.10.1:1
    - pdiplugin-decl-hdf5 ~mpi
    - pdiplugin-decl-netcdf ~mpi
    - pdiplugin-pycall
    - pdiplugin-set-value
    - pdiplugin-trace
    - 'python@3.13'

    - py-dask
    - py-h5py
    - py-imageio
    - py-matplotlib
    - py-netcdf4 ~mpi
    - py-numpy
    - py-pyyaml
    - py-scipy
    - py-sympy
    - py-xarray
  - architectures:
    - arch=linux-rhel8-zen3
  specs:
  - matrix:
    - [$packages]
    - [$architectures]
  repos:
    patches:
      git: https://github.com/gyselax/spack.git
      branch: cines-hackathon
    builtin:
      tag: v2026.03.0
  concretizer:
    unify: true
    reuse: false
    duplicates:
      strategy: none
  packages:
    all:
      permissions:
        read: world
        write: group
      variants: ~fortran ~mpi
    c:
      require: gcc@13.2.1
    cxx:
      require: gcc@13.2.1
    lapack:
      require: openblas
    py-dask:
      prefer: ['~dataframe']
    py-pandas:
      prefer: ['~performance']
  modules:
    default:
      roots: {}
      enable: []
  view: false
