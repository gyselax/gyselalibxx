spack:
  definitions:
  - packages:
    - cmake@3.31
    - 'ddc@0.12 +fft +pdi +splines'
    - ginkgo@1.9 ~openmp +cuda cuda_arch=80
    - googletest@1.17 +gmock
    - kokkos@4.7 ~openmp +cuda +cuda_relocatable_device_code +cuda_constexpr cuda_arch=80
    - kokkos-kernels@4.7 ~shared
    - kokkos-tools@git.e222e7b6cc7faae5d096e3520d95ca832fb9f889
    - 'koliop@0.1.2:0.1'
    - lapack
    - mpi
    - ninja@1.13
    - paraconf@1.0
    - pdi@1.10.1:1.10
    - pdiplugin-decl-hdf5@1.10 +mpi
    - pdiplugin-decl-netcdf@1.10 +mpi
    - pdiplugin-mpi@1.10
    - pdiplugin-pycall@1.10
    - pdiplugin-set-value@1.10
    - pdiplugin-trace@1.10
    - 'python@3.13'

    - py-dask
    - py-h5py
    - py-imageio
    - py-matplotlib
    - py-netcdf4 +mpi
    - py-numpy
    - py-pyyaml
    - py-scipy
    - py-sympy
    - py-xarray
  - architectures:
    - arch=linux-sles15-icelake
  specs:
  - matrix:
    - [$packages]
    - [$architectures]
  repos:
    patches:
      git: https://github.com/gyselax/spack.git
      branch: releases/v2025.11
      destination: $HOME/patches-2025.11.0
    builtin:
      git: https://github.com/spack/spack-packages.git
      tag: v2025.11.0
      destination: $HOME/spack-packages-2025.11.0
  concretizer:
    unify: true
    reuse: false
  packages:
    all:
      permissions:
        read: group
        write: group
      variants: ~fortran ~mpi
    cuda:
      buildable: false
      externals:
      - spec: cuda@12.8.93
        prefix: /mpcdf/soft/SLE_15/packages/x86_64/cuda/12.8.1
    c:
      require: gcc@14.1.0
    cxx:
      require: gcc@14.1.0
    gcc:
      externals:
      - spec: gcc@14.1.0
        prefix: /mpcdf/soft/SLE_15/packages/x86_64/gcc/14.1.0
        extra_attributes:
          compilers:
            c: /mpcdf/soft/SLE_15/packages/x86_64/gcc/14.1.0/bin/gcc
            cxx: /mpcdf/soft/SLE_15/packages/x86_64/gcc/14.1.0/bin/g++
            fortran: /mpcdf/soft/SLE_15/packages/x86_64/gcc/14.1.0/bin/gfortran
    kokkos-fft:
      require: 'host_backend=fftw-serial device_backend=cufft'
    lapack:
      require: openblas
    mpi:
      require: openmpi
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@5.0.9+cuda~java~memchecker~rocm~static~wrapper-rpath fabrics=psm2,ucx schedulers=none
        prefix: /mpcdf/soft/SLE_15/packages/skylake/openmpi_gpu/cuda_12.8-12.8.1-gcc_14-14.1.0/5.0.9
    py-dask:
      prefer: ['~dataframe']
    py-pandas:
      prefer: ['~performance']
  view: false
