spack:
  definitions:
  - packages:
    - cmake
    - ginkgo@1.9 ~openmp +cuda cuda_arch=80
    - googletest +gmock
    - kokkos@4.7 ~openmp +cuda +cuda_relocatable_device_code +cuda_constexpr cuda_arch=80
    - kokkos-fft@0.4 host_backend=fftw-serial device_backend=cufft
    - kokkos-kernels@4.7 ~shared
    - kokkos-tools
    - koliop
    - lapack
    - mpi
    - ninja
    - paraconf
    - pdi
    - pdiplugin-decl-hdf5 +mpi
    - pdiplugin-decl-netcdf +mpi
    - pdiplugin-mpi
    - pdiplugin-pycall
    - pdiplugin-set-value
    - pdiplugin-trace
    - python@3.12

    - py-dask
    - py-h5py
    - py-imageio
    - py-matplotlib
    - py-netcdf4 +mpi
    - py-numpy
    - py-pyyaml
    - py-scipy
    - py-sympy
    - py-xarray
  - architectures:
    - arch=linux-rhel8-zen3
  specs:
  - matrix:
    - [$packages]
    - [$architectures]
  repos:
    patches:
      git: https://github.com/gyselax/spack.git
      branch: releases/v2025.11
    builtin:
      branch: releases/v2025.11
  concretizer:
    unify: true
  packages:
    all:
      permissions:
        read: group
        write: group
      variants: ~fortran ~mpi
    gcc:
      externals:
      - spec: gcc@11.2.0 languages:='c,c++,fortran'
        prefix: /opt/cray/pe/gcc/11.2.0
        extra_attributes:
          compilers:
            c: /opt/cray/pe/gcc/11.2.0/bin/gcc
            cxx: /opt/cray/pe/gcc/11.2.0/bin/g++
            fortran: /opt/cray/pe/gcc/11.2.0/bin/gfortran
    llvm:
      externals:
      - spec: llvm@11.0.1+clang~flang~lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang
            cxx: /usr/bin/clang++
      buildable: false
    cuda:
      buildable: false
      externals:
      - spec: cuda@12.2.140
        prefix: /app/apps/cuda/12.2.2
    kokkos-fft:
      require: '@0.4 host_backend=fftw-serial device_backend=cufft'
    lapack:
      require: openblas
    mpi:
      require: openmpi
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@5.0.8+cuda~java~memchecker~rocm~static~wrapper-rpath fabrics=ofi,ucx schedulers=none
        prefix: /app/apps/openmpi/5.0.8-gcc11-cuda12
    py-dask:
      variants: ~dataframe
  view: false
