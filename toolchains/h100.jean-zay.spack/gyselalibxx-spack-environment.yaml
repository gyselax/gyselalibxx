spack:
  definitions:
  - packages:
    - cmake
    - 'ddc@0.12 +fft +pdi +splines'
    - ginkgo@1.9 ~openmp +cuda cuda_arch=90
    - googletest +gmock
    - kokkos@4.7 ~openmp +cuda +cuda_relocatable_device_code +cuda_constexpr cuda_arch=90
    - kokkos-kernels@4.7 ~shared
    - kokkos-tools@git.e222e7b6cc7faae5d096e3520d95ca832fb9f889
    - 'koliop@0.1.2:0.1'
    - lapack
    - mpi
    - ninja
    - paraconf
    - pdi@1.10.1:1
    - pdiplugin-decl-hdf5 +mpi
    - pdiplugin-decl-netcdf +mpi
    - pdiplugin-mpi
    - pdiplugin-pycall
    - pdiplugin-set-value
    - pdiplugin-trace
    - 'python@3.13'

    - py-dask
    - py-h5py
    - py-imageio
    - py-matplotlib
    - py-netcdf4 +mpi
    - py-numpy
    - py-pyyaml
    - py-scipy
    - py-sympy
    - py-xarray
  - architectures:
    - arch=linux-rhel9-sapphirerapids
  specs:
  - matrix:
    - [$packages]
    - [$architectures]
  repos:
    patches:
      git: https://github.com/gyselax/spack.git
      branch: releases/v2025.11
      destination: $ALL_CCFRWORK/patches-2025.11.0
    builtin:
      git: https://github.com/spack/spack-packages.git
      tag: v2025.11.0
      destination: $ALL_CCFRWORK/spack-packages-2025.11.0
  concretizer:
    unify: true
    reuse: false
  packages:
    all:
      permissions:
        read: group
        write: group
      variants: ~fortran ~mpi
    cuda:
      buildable: false
      externals:
      - spec: cuda@12.8.61
        prefix: /lustre/fshomisc/sys/common/nvidia/cuda/12.8
    c:
      require: gcc@14.3.0
    cxx:
      require: gcc@14.3.0
    gcc:
      externals:
      - spec: gcc@14.3.0 languages:='c,c++,fortran'
        prefix: /lustre/fshomisc/sup/spack_soft/gcc/14.3.0/gcc-11.4.1-jqsvuauftoo43tclwxs7qicltsslka3y
        extra_attributes:
            compilers:
              c: /lustre/fshomisc/sup/spack_soft/gcc/14.3.0/gcc-11.4.1-jqsvuauftoo43tclwxs7qicltsslka3y/bin/gcc
              cxx: /lustre/fshomisc/sup/spack_soft/gcc/14.3.0/gcc-11.4.1-jqsvuauftoo43tclwxs7qicltsslka3y/bin/g++
              fortran: /lustre/fshomisc/sup/spack_soft/gcc/14.3.0/gcc-11.4.1-jqsvuauftoo43tclwxs7qicltsslka3y/bin/gfortran
    kokkos-fft:
      require: '@0.4 host_backend=fftw-serial device_backend=cufft'
    lapack:
      require: openblas
    mpi:
      require: openmpi
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@4.1.6+cuda~cxx~cxx_exceptions~java+lustre~memchecker+pmi~static~wrapper-rpath
          fabrics=ucx schedulers=slurm
        prefix: /lustre/fshomisc/sup/spack_soft/openmpi/4.1.6/gcc-11.4.1-hbuwwfts4cctbzqir427u56mkk6zu3qr
    py-dask:
      prefer: ['~dataframe']
    py-pandas:
      prefer: ['~performance']
  view: false
