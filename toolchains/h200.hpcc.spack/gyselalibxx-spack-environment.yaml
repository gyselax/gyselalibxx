spack:
  definitions:
  - packages:
    - cmake
    - 'ddc@0.12 +fft +pdi +splines'
    - ginkgo@1.9 ~openmp +cuda cuda_arch=90
    - googletest +gmock
    - kokkos@4.7 ~openmp +cuda +cuda_relocatable_device_code +cuda_constexpr cuda_arch=90
    - kokkos-kernels@4.7 ~shared
    - kokkos-tools
    - koliop@0.1.2:0.1
    - lapack
    - mpi
    - ninja
    - paraconf
    - pdi@1.10.1:1 +python
    - pdiplugin-decl-hdf5 +mpi
    - pdiplugin-decl-netcdf +mpi
    - pdiplugin-mpi
    - pdiplugin-pycall
    - pdiplugin-set-value
    - pdiplugin-trace
    - python@3.13
    - py-dask
    - py-h5py
    - py-imageio
    - py-matplotlib
    - py-netcdf4 +mpi
    - py-numpy
    - py-pyyaml
    - py-scipy
    - py-sympy
    - py-xarray
  - architectures:
    - arch=linux-rocky8-skylake
  specs:
  - matrix:
    - [$packages]
    - [$architectures]
  repos:
    patches:
      git: https://github.com/gyselax/spack.git
      branch: releases/v2025.11
    builtin:
      branch: releases/v2025.11
  concretizer:
    unify: true
  packages:
    all:
      permissions:
        read: group
        write: group
      variants: ~fortran ~mpi
    cuda:
      buildable: false
      externals:
      - spec: cuda@12.9.86
        prefix: /usr/local/cuda-12.9
    c:
      require: gcc@12.3.0
    cxx:
      require: gcc@12.3.0
    gcc:
      externals:
      - spec: gcc@12.3.0 languages:='c,c++,fortran'
        prefix: /usr/local/gcc-12.3
        extra_attributes:
          compilers:
            c: /usr/local/gcc-12.3/bin/gcc
            cxx: /usr/local/gcc-12.3/bin/g++
            fortran: /usr/local/gcc-12.3/bin/gfortran
    lapack:
      require: openblas
    mpi:
      require: openmpi +cuda
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@4.1.5+cuda+cxx~cxx_exceptions~java~memchecker+pmi~rocm+static~wrapper-rpath fabrics=ucx schedulers=none
        prefix: /usr/local/openmpi-4.1.5/gpu-ext
    py-dask:
      prefer: ['~dataframe']
    py-pandas:
      prefer: ['~performance']
  view: false
